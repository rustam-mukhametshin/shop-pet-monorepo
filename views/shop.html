<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Shop</title>
  <style>
      body {
          margin: 0;
          padding: 0;
          font-family: sans-serif;
      }

      header {
          width: 100%;
          height: 3rem;
          background: #c07a00;
          padding: 0 1.5rem;

          nav {
              height: 100%;
              display: flex;
              align-items: center;

              ul {
                  list-style: none;
                  margin: 0;
                  padding: 0;
                  display: flex;

                  li {
                      margin: 0 1rem;
                      padding: 0;


                      a {
                          text-decoration: none;
                          color: white;
                          &:hover, &:active, &.active {
                            color: yellowgreen;
                          }
                      }
                  }
              }
          }
      }

      main{
          padding: 1rem;
      }
  </style>
</head>
<body>
<header>
  <nav>
    <ul>
      <li><a href="/" class="active">Shop</a></li>
      <li><a href="/admin/add-product">Add Product</a></li>
    </ul>
  </nav>
</header>

<main>
  <h1>My products</h1>
  <p>List of all the products ...</p>
</main>
</body>
</html>
