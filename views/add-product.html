<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Add Product</title>
  <style>
      body {
          margin: 0;
          padding: 0;
          font-family: sans-serif;
      }

      header {
          width: 100%;
          height: 3rem;
          background: #c07a00;
          padding: 0 1.5rem;

          nav {
              height: 100%;
              display: flex;
              align-items: center;

              ul {
                  list-style: none;
                  margin: 0;
                  padding: 0;
                  display: flex;

                  li {
                      margin: 0 1rem;
                      padding: 0;


                      a {
                          text-decoration: none;
                          color: white;

                          &:hover, &:active, &.active {
                              color: yellowgreen;
                          }
                      }
                  }
              }
          }
      }

      main {
          padding: 1rem;
      }

      form {
          width: 30rem;
          max-width: 90%;

          label {
              margin: 1rem 0;
          }

          label, input {
              display: block;
          }

          input {
              border: 1px solid #c08c00;
              border-radius: 5px;
          }

          button {
              border: 1px solid #c08c00;
              background: white;
              border-radius: 5px;
              cursor: pointer;
              color: #c08c00;

              &:hover {
                  background: purple;
              }
          }
      }
  </style>
</head>
<body>
<header>
  <nav>
    <ul>
      <li><a href="/" class="active">Shop</a></li>
      <li><a href="/admin/add-product">Add Product</a></li>
    </ul>
  </nav>
</header>

<main>
  <form action="/admin/add-product" method="post">
    <label>
      Title
      <input type="text" name="title">
    </label>
    <button type="submit">Add Product</button>
  </form>
</main>
</body>
</html>
