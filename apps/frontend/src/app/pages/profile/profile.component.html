<section class="profile-page">
  <div class="mb-4">
    <h1 class="h3 mb-1">Profile</h1>
    <p class="text-muted mb-0">Manage your account settings and 2FA status.</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="alert alert-success" role="alert">
    {{ successMessage }}
  </div>

  <div *ngIf="isLoading" class="text-muted">Loading profile...</div>

  <form *ngIf="!isLoading" [formGroup]="profileForm">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input
              id="name"
              type="text"
              class="form-control"
              formControlName="name"
              [class.is-invalid]="nameControl.touched && nameControl.invalid"
      />
      <div class="invalid-feedback" *ngIf="nameControl.touched && nameControl.errors?.['required']">
        Name is required.
      </div>
    </div>

    <div class="form-check mb-4">
      <input id="twoFA" type="checkbox" class="form-check-input" formControlName="twoFA"/>
      <label for="twoFA" class="form-check-label">Enable 2FA</label>
    </div>
  </form>
</section>
