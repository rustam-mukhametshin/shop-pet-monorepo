<div class="d-flex align-items-center justify-content-between mb-4">
  <h1 class="h3 mb-0">Products</h1>
  <a class="btn btn-primary" routerLink="/products/create">Create product</a>
</div>

<div class="row g-3" *ngIf="products$ | async as products">
  <div class="col-12 col-md-6 col-lg-4" *ngFor="let product of products">
    <app-product [product]="product" (remove)="removeProduct($event)"></app-product>
  </div>

  <div class="col-12" *ngIf="products.length === 0">
    <p class="text-muted mb-0">No products yet.</p>
  </div>
</div>
