@if (product()) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ product()?.title }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-card-subtitle class="mb-3">{{ product()?.description }}</mat-card-subtitle>
      <p>${{ product()?.price | number: '1.2-2' }}</p>
    </mat-card-content>
    <mat-card-actions>
      @if (showActions) {
        <div class="d-flex gap-2">
          <a mat-button color="primary" [routerLink]="['/products', product()?._id]">View</a>
          <a mat-button color="accent" [routerLink]="['/products', product()?._id, 'update']">Update</a>
          <button mat-button color="warn" (click)="deleteProduct()">Delete</button>
        </div>
      }
    </mat-card-actions>
    <mat-card-footer>
      @if (detailView) {
        <a class="btn btn-secondary" routerLink="/products">Back to products</a>
      }
    </mat-card-footer>
  </mat-card>
} @else {
  <p class="text-danger mb-0">Product not found.</p>
}
