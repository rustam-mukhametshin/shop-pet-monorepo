<main class="login-page d-flex align-items-center justify-content-center py-5">
  <section class="login-card card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <div class="mb-4 text-center">
        <p class="text-uppercase text-primary fw-semibold mb-2 small">Shop Pet</p>
        <h1 class="h3 mb-2">Sign in to your account</h1>
        <p class="text-muted mb-0">Use your email and password to continue.</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert alert-success" role="alert">
        {{ successMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            id="email"
            type="email"
            class="form-control form-control-lg"
            formControlName="email"
            placeholder="name@example.com"
            [class.is-invalid]="emailControl.touched && emailControl.invalid"
          />
          <div class="invalid-feedback" *ngIf="emailControl.touched && emailControl.errors?.['required']">
            Email is required.
          </div>
          <div class="invalid-feedback" *ngIf="emailControl.touched && emailControl.errors?.['email']">
            Enter a valid email address.
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            type="password"
            class="form-control form-control-lg"
            formControlName="password"
            placeholder="Your password"
            [class.is-invalid]="passwordControl.touched && passwordControl.invalid"
          />
          <div class="invalid-feedback" *ngIf="passwordControl.touched && passwordControl.errors?.['required']">
            Password is required.
          </div>
          <div class="invalid-feedback" *ngIf="passwordControl.touched && passwordControl.errors?.['minlength']">
            Password must be at least 6 characters.
          </div>
        </div>

        <div class="d-flex align-items-center justify-content-between mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" class="text-decoration-none small">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </section>
</main>
