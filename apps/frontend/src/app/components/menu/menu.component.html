<mat-toolbar color="primary">
  <!-- Mobile: hamburger button -->
  <button mat-icon-button class="mobile-only" [matMenuTriggerFor]="mobileMenu" aria-label="Open navigation menu">
    <mat-icon>menu</mat-icon>
  </button>

  <a class="brand" routerLink="/products">Shop Pet</a>
  <span class="spacer"></span>

  <!-- Desktop: inline nav links -->
  <nav class="desktop-only">
    @if (isAuth()) {
      <a mat-button routerLink="/products" routerLinkActive="active">
        <mat-icon>store</mat-icon> Products
      </a>
      <a mat-button routerLink="/products/create" routerLinkActive="active">
        <mat-icon>add_circle</mat-icon> Create product
      </a>
      <a mat-button routerLink="/profile" routerLinkActive="active">
        <mat-icon>person</mat-icon> Profile
      </a>
      <mat-divider vertical />
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    } @else {
      <a mat-button routerLink="/login" routerLinkActive="active">
        <mat-icon>login</mat-icon> Login
      </a>
      <a mat-button routerLink="/signup" routerLinkActive="active">
        <mat-icon>person_add</mat-icon> Sign up
      </a>
    }
  </nav>
</mat-toolbar>

<!-- Mobile: dropdown menu -->
<mat-menu #mobileMenu="matMenu">
  @if (isAuth()) {
    <a mat-menu-item routerLink="/products">
      <mat-icon>store</mat-icon> Products
    </a>
    <a mat-menu-item routerLink="/products/create">
      <mat-icon>add_circle</mat-icon> Create product
    </a>
    <a mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon> Profile
    </a>
    <mat-divider />
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  } @else {
    <a mat-menu-item routerLink="/login">
      <mat-icon>login</mat-icon> Login
    </a>
    <a mat-menu-item routerLink="/signup">
      <mat-icon>person_add</mat-icon> Sign up
    </a>
  }
</mat-menu>
